services:
  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod

  django-web:
    build: .
    container_name: django-docker
    depends_on:
      - db
    volumes:
      - ./static:/app/staticfiles
    env_file:
      - .env.prod
    environment:
      - DJANGO_ENV=production

  frontend-proxy:
    build:
      context: .
      dockerfile: nginx.dockerfile
    ports:
      - "8001:80"
    volumes:
      - ./static:/static:ro
    depends_on:
      - django-web

volumes:
  postgres_data: