services:
  db-local:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: ala_el_8ahwa
      POSTGRES_USER: khaled
      POSTGRES_PASSWORD: 123123
    container_name: ala_el_8ahwa_db_local

  django-app-local:
    build: .
    user: root
    command: python manage.py runserver 0.0.0.0:8000 
    depends_on:
      - db-local
    volumes:
      - .:/app
      - ./static:/app/staticfiles
    env_file:
      - .env.local
    environment:
      - DJANGO_ENV=local
    container_name: ala_el_8ahwa_app_local

  nginx-local:
    build:
      context: .
      dockerfile: nginx.dockerfile
    ports:
      - "8001:80"
    volumes:
      - ./static:/static:ro
    depends_on:
      - django-app-local
    container_name: ala_el_8ahwa_reverse_proxy_local

volumes:
  postgres_data:
